---
apiVersion: v1
kind: Service
metadata:
  name: petcare-backend
  namespace: petcare
  labels:
    app: petcare-backend
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
  selector:
    app: petcare-backend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petcare-backend
  namespace: petcare
  labels:
    app: petcare-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petcare-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: petcare-backend
    spec:
      containers:
        - name: backend
          image: SEU_DOCKERHUB/petcare-backend:latest   # substitua
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: petcare-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: AWS_SESSION_TOKEN
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
