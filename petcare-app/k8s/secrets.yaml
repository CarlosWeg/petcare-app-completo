# ⚠️  ATENÇÃO: Substitua os valores com base64 reais antes de aplicar.
# Gere com: echo -n "valor" | base64
# Em produção, use AWS Secrets Manager ou Vault.
apiVersion: v1
kind: Secret
metadata:
  name: petcare-secrets
  namespace: petcare
type: Opaque
data:
  # echo -n "sua-access-key" | base64
  AWS_ACCESS_KEY_ID: ""
  # echo -n "sua-secret-key" | base64
  AWS_SECRET_ACCESS_KEY: ""
  # echo -n "seu-session-token" | base64  (apenas AWS Academy)
  AWS_SESSION_TOKEN: ""
