---
apiVersion: v1
kind: Service
metadata:
  name: petcare-frontend
  namespace: petcare
  labels:
    app: petcare-frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080     # acessível via IP_MASTER:30080
  selector:
    app: petcare-frontend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petcare-frontend
  namespace: petcare
  labels:
    app: petcare-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petcare-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: petcare-frontend
    spec:
      containers:
        - name: frontend
          image: SEU_DOCKERHUB/petcare-frontend:latest   # substitua
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
