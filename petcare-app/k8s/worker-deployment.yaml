---
# Worker SQS — consome fila e invoca Lambda
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petcare-worker
  namespace: petcare
  labels:
    app: petcare-worker
spec:
  replicas: 1    # apenas 1 réplica para evitar processamento duplicado
  selector:
    matchLabels:
      app: petcare-worker
  template:
    metadata:
      labels:
        app: petcare-worker
    spec:
      restartPolicy: Always
      containers:
        - name: worker
          image: SEU_DOCKERHUB/petcare-worker:latest   # substitua
          envFrom:
            - configMapRef:
                name: petcare-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: AWS_SESSION_TOKEN
            - name: POLL_WAIT_SECONDS
              value: "20"
            - name: MAX_MESSAGES
              value: "10"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
