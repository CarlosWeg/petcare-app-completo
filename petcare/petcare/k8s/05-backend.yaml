apiVersion: apps/v1
kind: Deployment
metadata:
  name: petcare-backend
  namespace: petcare
  labels:
    app: petcare-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petcare-backend
  template:
    metadata:
      labels:
        app: petcare-backend
    spec:
      containers:
        - name: petcare-backend
          # Substitua pelo seu usuário Docker Hub:
          # docker build -t SEU_USUARIO/petcare-backend:latest ./backend
          # docker push SEU_USUARIO/petcare-backend:latest
          image: SEU_USUARIO_DOCKERHUB/petcare-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: APP_PORT
              value: "8080"
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: petcare-config
                  key: AWS_REGION
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: MONGO_URI
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: petcare-config
                  key: REDIS_ADDR
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: SQS_QUEUE_URL
            - name: SNS_TOPIC_ARN
              valueFrom:
                secretKeyRef:
                  name: petcare-secrets
                  key: SNS_TOPIC_ARN
            - name: LAMBDA_FUNCTION_NAME
              valueFrom:
                configMapKeyRef:
                  name: petcare-config
                  key: LAMBDA_FUNCTION_NAME
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SESSION_TOKEN
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: petcare
  labels:
    app: petcare-backend
spec:
  type: NodePort
  selector:
    app: petcare-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
