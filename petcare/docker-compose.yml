version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: petcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - petcare-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petcare-backend
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      MONGO_URI: "mongodb://mongodb:27017/petcare"
      MONGO_DATABASE: "petcare"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      SQS_QUEUE_URL: "${SQS_QUEUE_URL:-}"
      SNS_TOPIC_ARN: "${SNS_TOPIC_ARN:-}"
      LAMBDA_FUNCTION_NAME: "${LAMBDA_FUNCTION_NAME:-petcare-cloud-processar-agendamento}"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - petcare-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
    container_name: petcare-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - petcare-net
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  petcare-net:
    driver: bridge
