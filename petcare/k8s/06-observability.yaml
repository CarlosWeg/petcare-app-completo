apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-info
  namespace: petcare
data:
  observability.md: |
    Observabilidade básica do projeto:
    - Logs dos pods via kubectl logs.
    - Status dos pods via kubectl get pods.
    - Logs da Lambda no AWS CloudWatch.
    - Eventos do Kubernetes via kubectl get events.

    Comandos úteis:
    kubectl get pods -n petcare
    kubectl logs -n petcare deployment/backend
    kubectl logs -n petcare deployment/worker
    kubectl get events -n petcare --sort-by=.metadata.creationTimestamp